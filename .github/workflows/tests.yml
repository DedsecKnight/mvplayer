name: C/C++ CI/CD Pipeline

on: 
  pull_request:
    branch: 
      - main

jobs:
  ubuntu-build:
    runs-on: ubuntu-latest
    steps: 
      - name: Update apt package list & install g++-15
        run: sudo apt-get update && sudo apt install -y gcc-15 g++15
      
      - name: Checkout 
        uses: actions/checkout@v4
      
      - name: Configure g++-15
        run: echo "CXX=g++-15" >> $GITHUB_ENV

      - name: Install conan
        uses: conan-io/setup-conan@v1
        with:
          cache_packages: true
          profile_detect: false

      - name: Install Conan dependencies
        run: conan install . --build=missing -pr:h=profiles/profile_linux_x86 -pr:b=profiles/profile_linux_x86

      - name: Build tests
        shell: bash
        run: |
          cmake --preset conan-release
          cmake --build --preset conan-release

      - name: Run tests
        run: ./build/Release/tests/test

